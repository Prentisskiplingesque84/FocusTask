<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FocusTask</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="glow"></div>
    <div class="shell">
      <header class="topbar">
        <div class="brand">
          <div class="logo">FT</div>
          <div>
            <div class="title">FocusTask</div>
            <div class="subtitle"></div>
          </div>
        </div>
        <div class="userbox hidden" id="userBox">
          <span id="userLabel"></span>
          <button class="ghost" id="logoutBtn">Wyloguj</button>
        </div>
      </header>

      <section id="authSection" class="panel auth-panel">
        <div class="auth-switch">
          <button class="tab active" data-auth="login">Logowanie</button>
          <button class="tab" data-auth="register">Rejestracja</button>
        </div>

        <form id="loginForm" class="auth-form">
          <label>
            Nazwa uzytkownika
            <input type="text" name="username" autocomplete="username" required />
          </label>
          <label>
            Haslo
            <input type="password" name="password" autocomplete="current-password" required />
          </label>
          <button class="primary" type="submit">Zaloguj sie</button>
        </form>

        <form id="registerForm" class="auth-form hidden">
          <label>
            Nazwa uzytkownika
            <input type="text" name="username" autocomplete="username" required />
          </label>
          <label>
            Haslo (min 6 znakow)
            <input type="password" name="password" autocomplete="new-password" required />
          </label>
          <button class="primary" type="submit">Zaloz konto</button>
        </form>

        <div id="authMsg" class="message"></div>
      </section>

      <main id="mainSection" class="grid hidden">
        <section class="panel tasks-panel">
          <div class="panel-header">
            <div>
              <h2>Twoje zadania</h2>
              <p class="muted">Priorytety, tagi i deadline w jednym miejscu.</p>
            </div>
            <div class="count" id="taskCount">0</div>
          </div>

          <div class="list-bar">
            <label>
              Lista
              <select id="listSelect"></select>
            </label>
            <button class="ghost" id="newListToggle" type="button">Nowa lista</button>
          </div>
          <form id="newListForm" class="row hidden">
            <input type="text" id="newListName" placeholder="Nazwa listy" required />
            <button class="primary" type="submit">Utworz</button>
            <button class="ghost" type="button" id="newListCancel">Anuluj</button>
          </form>
          <div id="listRoleInfo" class="muted hidden"></div>

          <form id="taskForm" class="task-form">
            <input type="hidden" name="taskId" />
            <label>
              Tytul
              <input type="text" name="title" placeholder="np. Raport z projektu" required />
            </label>
            <label>
              Opis
              <textarea name="description" rows="3" placeholder="Opcjonalnie"></textarea>
            </label>
            <div class="row">
              <label>
                Priorytet
                <select name="priority">
                  <option value="1">Niski</option>
                  <option value="2" selected>Sredni</option>
                  <option value="3">Wysoki</option>
                </select>
              </label>
              <label>
                Deadline
                <input type="datetime-local" name="deadline" />
              </label>
            </div>
            <label>
              Tagi (oddziel przecinkami)
              <input type="text" name="tags" placeholder="szkola, projekt, egzamin" />
            </label>
            <div class="row">
              <button class="primary" type="submit" id="taskSubmit">Dodaj zadanie</button>
              <button class="ghost hidden" type="button" id="taskCancel">Anuluj</button>
            </div>
          </form>

          <div class="filters">
            <input type="search" id="searchInput" placeholder="Szukaj zadania" />
            <select id="statusFilter">
              <option value="all">Wszystkie</option>
              <option value="active">Aktywne</option>
              <option value="done">Zakonczone</option>
            </select>
            <select id="priorityFilter">
              <option value="all">Priorytet</option>
              <option value="1">Niski</option>
              <option value="2">Sredni</option>
              <option value="3">Wysoki</option>
            </select>
            <select id="tagFilter">
              <option value="all">Tag</option>
            </select>
          </div>

          <div id="tasksList" class="tasks"></div>
        </section>

        <section class="panel side-panel">
          <div class="panel-block">
            <div class="block-header">
              <h3>Zaproszenia</h3>
            </div>
            <div id="inviteList" class="invites"></div>
          </div>

          <div class="panel-block">
            <div class="block-header">
              <h3>Zaproszenia do listy</h3>
            </div>
            <div id="shareInfo" class="muted">Wybierz liste, aby wyslac zaproszenie.</div>
            <form id="shareForm" class="share-form hidden">
              <label>
                Uzytkownik (login)
                <input type="text" id="shareUsername" placeholder="np. kasia" />
              </label>
              <label>
                Uprawnienia
                <select id="shareRole">
                  <option value="viewer">Podglad</option>
                  <option value="editor">Edycja</option>
                </select>
              </label>
              <button class="primary" type="submit">Wyslij zaproszenie</button>
            </form>
            <div id="shareMsg" class="muted"></div>
            <div id="membersList" class="members"></div>
          </div>

          <div class="panel-block">
            <div class="block-header">
              <h3>Eksport</h3>
            </div>
            <div class="row">
              <button class="ghost" id="exportCsvBtn" type="button">Eksport CSV</button>
              <button class="ghost" id="exportPdfBtn" type="button">Eksport PDF</button>
            </div>
          </div>

          <div class="panel-block">
            <div class="block-header">
              <h3>Powiadomienia</h3>
              <button class="ghost" id="notifBtn">Wlacz</button>
            </div>
            <div id="notifStatus" class="muted">Brak aktywnych przypomnien.</div>
            <div id="notifList" class="notif-list"></div>
          </div>

          <div class="panel-block">
            <div class="block-header">
              <h3>Tryb produktywnosci</h3>
              <span class="pill" id="pomodoroMode">Praca</span>
            </div>
            <div class="pomodoro">
              <div class="timer" id="pomodoroTimer">25:00</div>
              <div class="row">
                <label>
                  Praca (min)
                  <input type="number" id="workMinutes" min="10" max="90" value="25" />
                </label>
                <label>
                  Przerwa (min)
                  <input type="number" id="breakMinutes" min="3" max="30" value="5" />
                </label>
              </div>
              <div class="row">
                <button class="primary" id="pomodoroStart">Start</button>
                <button class="ghost" id="pomodoroPause">Pauza</button>
                <button class="ghost" id="pomodoroReset">Reset</button>
              </div>
              <div class="muted" id="pomodoroInfo">Sesje ukonczone: 0</div>
            </div>
          </div>

          <div class="panel-block">
            <div class="block-header">
              <h3>Statystyki</h3>
            </div>
            <div id="stats" class="stats"></div>
          </div>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
